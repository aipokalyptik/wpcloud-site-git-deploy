name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run Go tests
        run: go test ./...
      - name: Build static Linux binary
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build ./cmd/wpcloud-site-git-deploy
      - name: Run Bash spec oracle
        run: spec/tests/run.sh
